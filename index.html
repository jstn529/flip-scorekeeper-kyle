<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KyleLittleForCongress Flip Scorekeeper</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

</head>
<body>

<header>

<h1>KyleLittleForCongress</h1>
<p>Community Flip Scoreboard</p>

</header>


<div class="scoreboard">

<div class="team">

<input id="leftName" value="Team A">

<div class="flip-container">

<div class="card" id="leftCard">

<div class="top">0</div>
<div class="bottom">0</div>

</div>

</div>

<div class="buttons">

<button onclick="changeScore('left',1)">+</button>
<button onclick="changeScore('left',-1)">-</button>

</div>

</div>



<div class="team">

<input id="rightName" value="Team B">

<div class="flip-container">

<div class="card" id="rightCard">

<div class="top">0</div>
<div class="bottom">0</div>

</div>

</div>

<div class="buttons">

<button onclick="changeScore('right',1)">+</button>
<button onclick="changeScore('right',-1)">-</button>

</div>

</div>

</div>


<div class="controls">

<button onclick="resetScore()">Reset</button>
<button onclick="swap()">Swap</button>

</div>


<script src="script.js"></script>

</body>
</html>
