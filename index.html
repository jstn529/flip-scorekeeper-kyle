<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KyleLittleForCongress Flip Scorekeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand-block">
        <div class="brand-kicker">COMMUNITY SCOREKEEPER</div>
        <h1>KyleLittleForCongress Flip Scorekeeper</h1>
      </div>

      <div class="header-actions">
        <button id="addBoardBtn" class="btn btn-primary">Add Team Board</button>
        <button id="removeBoardBtn" class="btn btn-outline">Remove Team Board</button>
        <button id="resetAllBtn" class="btn btn-danger">Reset All</button>
      </div>
    </div>
  </header>

  <main class="main-shell">
    <section class="toolbar-card">
      <div class="toolbar-left">
        <div class="toolbar-title">Board Controls</div>
        <div class="toolbar-subtitle">
          Use one board for a simple matchup or add up to three boards for multiple teams.
        </div>
      </div>

      <div class="toolbar-right">
        <div class="counter-pill">
          Active Boards: <span id="boardCount">2</span>
        </div>
      </div>
    </section>

    <section id="boardsContainer" class="boards-grid"></section>
  </main>

  <template id="boardTemplate">
    <article class="team-board">
      <div class="team-board-top">
        <input class="team-name-input" type="text" maxlength="24" value="Team" />
      </div>

      <div class="flip-score-card">
        <div class="score-display">0</div>
        <div class="flip-anim flip-top"></div>
        <div class="flip-anim flip-bottom"></div>
        <div class="score-divider"></div>
      </div>

      <div class="board-controls">
        <button class="btn btn-ghost minus-btn">-1</button>
        <button class="btn btn-primary plus-btn">+1</button>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
